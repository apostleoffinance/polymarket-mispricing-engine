name: Research Pipeline

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: research_engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Backfill history
        run: |
          RELATIONSHIP_COUNT=$(uv run python - <<'PY'
          from db import connect

          with connect() as conn:
              with conn.cursor() as cur:
                  cur.execute(
                      """
                      SELECT COUNT(*)
                      FROM market_relationships
                      WHERE parent_market_id IS NOT NULL
                        AND related_market_id IS NOT NULL
                      """
                  )
                  print(cur.fetchone()[0])
          PY
          )

          echo "Existing relationships: ${RELATIONSHIP_COUNT}"

          if [ "${RELATIONSHIP_COUNT}" = "0" ]; then
            echo "No relationships yet; running bootstrap backfill."
            uv run run_backfill_history.py --limit 200
          else
            echo "Relationships found; running targeted backfill."
            uv run run_backfill_history.py --relationships --limit 50
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build graph
        run: uv run run_graph.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run backtest
        run: uv run run_backtest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
